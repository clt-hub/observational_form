<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CLT Classroom Observation Form - FCCU</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
overflow:hidden;
}

.header{
text-align:center;
padding:30px;
border-bottom:2px solid #eee;
}

.header h1{
font-size:28px;
margin-bottom:6px;
}

.subtitle{
font-size:14px;
color:#555;
}

.form-content{
padding:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input, textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.section{
border:1px solid #ddd;
padding:20px;
border-radius:8px;
margin-top:25px;
background:#fafafa;
}

.section-title{
font-weight:700;
margin-bottom:15px;
}

.checkbox-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.checkbox-item input[type="checkbox"]{
width:18px;
height:18px;
}

button{
padding:12px 40px;
border:none;
background:#8B5A3C;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#6B4423;
}

.two-column{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:700px){
.two-column{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Classroom Observation Form</h1>
<div class="subtitle">Forman Christian College (A Chartered University)</div>
</div>

<div class="form-content">

<form id="obsForm"
method="POST"
action="YOUR_WEBAPP_URL_HERE">

<input type="hidden" name="secret" value="clt123">

<div class="two-column">

<div class="form-group">
<label>Observee Name</label>
<input type="text" name="observee_name" required>
</div>

<div class="form-group">
<label>Observer Name</label>
<input type="text" name="observer_name" required>
</div>

</div>

<div class="two-column">

<div class="form-group">
<label>Course Name</label>
<input type="text" name="course_name">
</div>

<div class="form-group">
<label>No. of Students</label>
<input type="number" name="num_students">
</div>

</div>

<div class="form-group">
<label>Date</label>
<input type="date" name="date">
</div>

<div class="section">

<div class="section-title">Teacher Behaviour</div>

<div class="checkbox-item">
<input type="checkbox" name="behaviour" value="punctual">
<label>Punctual</label>
</div>

<div class="checkbox-item">
<input type="checkbox" name="behaviour" value="organized">
<label>Organized and prepared</label>
</div>

<div class="checkbox-item">
<input type="checkbox" name="behaviour" value="eye_contact">
<label>Makes eye contact</label>
</div>

<div class="checkbox-item">
<input type="checkbox" name="behaviour" value="humor">
<label>Uses humor effectively</label>
</div>

</div>

<div class="section">

<div class="section-title">Comments</div>

<textarea name="overall_comments" rows="4"></textarea>

</div>

<br>

<center>
<button type="submit">Submit Observation</button>
</center>

</form>

</div>
</div>

<script>

document.getElementById("obsForm").addEventListener("submit", function(){

alert("Form submitted successfully!");

});

</script>

</body>
</html>
